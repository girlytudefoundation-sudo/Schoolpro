kind = "web"
previewPath = "/"
title = "School Management PWA"
version = "1.0.0"
id = "artifacts/school-pwa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21499

[services.development]
run = "pnpm --filter @workspace/school-pwa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/school-pwa", "run", "build" ]
publicDir = "artifacts/school-pwa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21499"
BASE_PATH = "/"
